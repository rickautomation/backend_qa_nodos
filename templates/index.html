<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22A06B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Greenbox">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="{{ url_for('web_manifest') }}">
  <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.svg') }}" type="image/svg+xml">
  <title>Greenbox</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function () {
      const key = "greenbox-theme";
      const saved = localStorage.getItem(key);
      const theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);

      const params = new URLSearchParams(window.location.search);
      if (params.get("app") === "tablet" || /GreenboxTablet/i.test(navigator.userAgent)) {
        document.documentElement.classList.add("app-tablet");
      }
    })();
  </script>
</head>
<body>
  <header>
    <div class="header-brand">
      <h1>Greenbox</h1>
      <p class="header-tagline">Cultivando inteligentemente</p>
    </div>
    <div class="header-actions">
      <button type="button" class="secondary app-tablet-only" onclick="appTabletReload()" aria-label="Recargar" title="Recargar">↻</button>
      <button type="button" class="secondary app-tablet-only" onclick="appTabletSettings()" aria-label="Conexión" title="Conexión">⚙</button>
      <button type="button" class="secondary" onclick="openControlsModal()">Controles</button>
      <button type="button" id="readings-open-btn" class="secondary readings-btn" onclick="openReadingsModal()">Lecturas</button>
      <button type="button" class="secondary" onclick="openPlanModal()">Plan</button>
      <button type="button" id="theme-toggle" class="theme-toggle secondary" aria-label="Cambiar tema" title="Cambiar tema">☀️</button>
    </div>
  </header>

  <main class="indoor-layout">
    <div id="indoor-scene" class="indoor-scene indoor-scene--loading" aria-live="polite">
      <p class="empty">Cargando indoor…</p>
    </div>

    <div id="control-bar" class="control-bar"></div>

    <section class="indoor-chart-section">
      <div class="section-head">
        <h2>Humedad del sustrato</h2>
        <div class="chart-tabs" id="soil-chart-tabs">
          <button type="button" class="secondary active" data-view="hours" data-span="24">24 h</button>
          <button type="button" class="secondary" data-view="days" data-span="7">7 días</button>
        </div>
      </div>
      <div id="soil-chart" class="card soil-chart-card soil-chart-card--embedded">
        <div class="soil-chart-head">
          <div class="soil-chart-current">
            <strong id="soil-chart-value">—</strong>
            <span id="soil-chart-unit">%</span>
          </div>
        </div>
        <div class="soil-chart-wrap">
          <canvas id="soil-chart-canvas" height="140" aria-label="Gráfica de humedad de suelo"></canvas>
        </div>
      </div>
    </section>

    <div id="live-sensors" class="sensor-cards visually-hidden" aria-hidden="true"></div>
    <div id="light-schedule" class="visually-hidden" aria-hidden="true"></div>
    <div id="cultivation-plan" class="visually-hidden" aria-hidden="true"></div>
    <div id="automation" class="visually-hidden" aria-hidden="true"></div>
    <div id="pumps" class="visually-hidden" aria-hidden="true"></div>
    <div id="relays" class="visually-hidden" aria-hidden="true"></div>
  </main>

  <div class="toast" id="toast"></div>

  <div id="history-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" onclick="closeHistoryModal()"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="history-modal-title">
      <div class="modal-head">
        <h3 id="history-modal-title">Historial AUTO</h3>
        <button type="button" class="secondary modal-close" onclick="closeHistoryModal()" aria-label="Cerrar">✕</button>
      </div>
      <div id="history-modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="readings-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" onclick="closeReadingsModal()"></div>
    <div class="modal-panel modal-panel--wide" role="dialog" aria-modal="true" aria-labelledby="readings-modal-title">
      <div class="modal-head">
        <h3 id="readings-modal-title">Lecturas por nodo</h3>
        <button type="button" class="secondary modal-close" onclick="closeReadingsModal()" aria-label="Cerrar">✕</button>
      </div>
      <div id="readings-modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="plan-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" onclick="closePlanModal()"></div>
    <div class="modal-panel modal-panel--wide" role="dialog" aria-modal="true" aria-labelledby="plan-modal-title">
      <div class="modal-head">
        <h3 id="plan-modal-title">Plan de cultivo</h3>
        <button type="button" class="secondary modal-close" onclick="closePlanModal()" aria-label="Cerrar">✕</button>
      </div>
      <div id="plan-modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="controls-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" onclick="closeControlsModal()"></div>
    <div class="modal-panel modal-panel--wide" role="dialog" aria-modal="true" aria-labelledby="controls-modal-title">
      <div class="modal-head">
        <h3 id="controls-modal-title">Controles manuales</h3>
        <button type="button" class="secondary modal-close" onclick="closeControlsModal()" aria-label="Cerrar">✕</button>
      </div>
      <div id="controls-modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="phase-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" onclick="closePhaseDetailModal()"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="phase-modal-title">
      <div class="modal-head">
        <h3 id="phase-modal-title">Detalle de etapa</h3>
        <button type="button" class="secondary modal-close" onclick="closePhaseDetailModal()" aria-label="Cerrar">✕</button>
      </div>
      <div id="phase-modal-body" class="modal-body"></div>
    </div>
  </div>

  <script>
    const RELAY_LABELS = ["Luz", "R2", "Humidificador", "Caloventor", "R5", "R6", "Ventilador 12V", "Extractor"];

      plantula: `

        </svg>`,
      vegetativo: `
        <svg viewBox="0 0 32 32" class="phase-icon-svg" aria-hidden="true">
          <path d="M16 28 L16 9" stroke="#14532d" stroke-width="2.4" stroke-linecap="round"/>

          <path d="M16 22 Q25 20 27 14 Q23 18 16 20" fill="#16a34a"/>
          <path d="M16 16 Q6 14 4 8 Q8 12 16 14" fill="#22c55e"/>

          <path d="M16 11 Q10 9 9 5 Q12 8 16 9" fill="#86efac"/>
          <path d="M16 11 Q22 9 23 5 Q20 8 16 9" fill="#86efac"/>
        </svg>`,
      floracion: `
        <svg viewBox="0 0 32 32" class="phase-icon-svg" aria-hidden="true">
          <path d="M16 28 L16 14" stroke="#14532d" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M16 20 Q9 18 7 13 Q11 16 16 18" fill="#15803d"/>
          <path d="M16 20 Q23 18 25 13 Q21 16 16 18" fill="#16a34a"/>
          <circle cx="16" cy="8" r="5.5" fill="#ec4899"/>
          <circle cx="12" cy="10" r="3" fill="#f9a8d4"/>
          <circle cx="20" cy="10" r="3" fill="#f9a8d4"/>

      floracion_tardia: `

          <path d="M16 28 L16 12" stroke="#14532d" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M16 21 Q8 19 6 14 Q10 17 16 19" fill="#15803d"/>
          <path d="M16 21 Q24 19 26 14 Q22 17 16 19" fill="#16a34a"/>
          <circle cx="11" cy="10" r="4" fill="#a855f7"/>
          <circle cx="21" cy="9" r="4.5" fill="#9333ea"/>

          <rect x="23" y="3" width="7" height="5" rx="0.5" fill="#111827"/>
          <rect x="23" y="3" width="3.5" height="2.5" fill="#f8fafc"/>
          <rect x="26.5" y="5.5" width="3.5" height="2.5" fill="#f8fafc"/>
        </svg>`,

    const PHASE_LABELS_SHORT = {
      germinacion: "Semilla brotando",
      plantula: "Planta chica",
      vegetativo: "Crecimiento",
      floracion: "Flores",
      floracion_tardia: "Pre-cosecha",
    };

    function phaseIcon(phaseName, sizeClass = "") {
      const svg = PHASE_ICON_SVG[phaseName] || PHASE_ICON_SVG.germinacion;
      const hint = PHASE_LABELS_SHORT[phaseName] || "";
      return `<span class="phase-icon ${sizeClass}" title="${escapeHtml(hint)}" aria-hidden="true">${svg}</span>`;
    }
    const liveSensorsEl = document.getElementById("live-sensors");
    const pumpsEl = document.getElementById("pumps");
    const relaysEl = document.getElementById("relays");
    const indoorSceneEl = document.getElementById("indoor-scene");
    const controlBarEl = document.getElementById("control-bar");
    const readingsOpenBtn = document.getElementById("readings-open-btn");
    const automationEl = document.getElementById("automation");
    const soilChartEl = document.getElementById("soil-chart");
    const soilChartCanvas = document.getElementById("soil-chart-canvas");
    const soilChartValueEl = document.getElementById("soil-chart-value");
    const soilChartTabsEl = document.getElementById("soil-chart-tabs");
    const lightScheduleEl = document.getElementById("light-schedule");
    const cultivationPlanEl = document.getElementById("cultivation-plan");
    const themeToggleEl = document.getElementById("theme-toggle");
    const toastEl = document.getElementById("toast");
    const THEME_KEY = "greenbox-theme";

    function uiIcon(key, sizeClass = "") {
      const svg = UI_ICONS[key];
      if (!svg) return "";
      return `<span class="ui-icon ${sizeClass}">${svg}</span>`;
    }

    const IRRIGATION_LABELS = {
      idle: "Reposo",
      awaiting_node: "Regando",
      pulsing: "Regando",
      settling: "Midiendo suelo",
    };

    let lastDashboardData = null;
    let browsedPhaseIndex = null;

    function getSelectedPhaseIndex(plan) {
      if (!plan?.fases?.length) return 0;
      if (browsedPhaseIndex != null && plan.fases[browsedPhaseIndex]) return browsedPhaseIndex;
      return plan.fase_index ?? 0;
    }

    function selectGrowPhase(index) {
      browsedPhaseIndex = index;
      if (lastDashboardData) renderIndoorScene(lastDashboardData);
    }

    function resetGrowPhaseBrowse() {
      browsedPhaseIndex = null;
      if (lastDashboardData) renderIndoorScene(lastDashboardData);
    }

    function openPhaseDetailModal() {
      const plan = cultivationPlan;
      if (!plan?.fases?.length) return;
      const selectedIndex = getSelectedPhaseIndex(plan);
      const selectedPhase = plan.fases[selectedIndex];
      if (!selectedPhase) return;
      const ev = lastDashboardData?.automation?.evaluation || {};
      const schedule = lastDashboardData?.light_schedule || {};
      const lightEnd = schedule.end || (() => {
        if (!schedule.start || schedule.hours_on == null) return "—";
        const [h, m] = schedule.start.split(":").map(Number);
        const total = h * 60 + m + schedule.hours_on * 60;
        return `${String(Math.floor(total / 60) % 24).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
      })();
      const modal = document.getElementById("phase-modal");
      document.getElementById("phase-modal-title").textContent = selectedPhase.label || "Etapa";
      document.getElementById("phase-modal-body").innerHTML = renderPhaseDetailPanel(selectedPhase, plan, {
        isLiveStage: Boolean(selectedPhase.activa),
        irrigation: ev.irrigation || {},
        schedule,
        lightEnd,
      });
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      syncModalUiState();
    }

    function closePhaseDetailModal() {
      const modal = document.getElementById("phase-modal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      syncModalUiState();
    }

    window.openPhaseDetailModal = openPhaseDetailModal;
    window.closePhaseDetailModal = closePhaseDetailModal;

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function currentTheme() {
      return document.documentElement.getAttribute("data-theme") || "dark";
    }

    function updateThemeToggleLabel() {
      const theme = currentTheme();
      themeToggleEl.textContent = theme === "light" ? "🌙" : "☀️";
      themeToggleEl.title = theme === "light" ? "Modo oscuro" : "Modo claro";
      themeToggleEl.setAttribute("aria-label", themeToggleEl.title);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
      updateThemeToggleLabel();
      if (lastSoilChartData) renderSoilChart(lastSoilChartData);
    }

    themeToggleEl.addEventListener("click", () => {
      setTheme(currentTheme() === "light" ? "dark" : "light");
    });

    updateThemeToggleLabel();

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    let soilConfig = { dry_adc: 60, wet_adc: 100 };

    function formatSensor(item) {
      const raw = item.raw ?? 0;
      const unit = item.unit ?? "";
      const key = (item.key ?? "lectura").replaceAll("_", " ");
      if (unit === "C*100") return `${key}: ${(raw / 100).toFixed(2)} °C`;
      if (unit === "%RH*100") return `Humedad aire: ${(raw / 100).toFixed(2)} %`;
      if (unit === "%") {
        const dry = soilConfig?.dry_adc ?? 60;
        const wet = soilConfig?.wet_adc ?? 100;
        const pct = wet === dry ? 0 : Math.max(0, Math.min(100, ((raw - dry) / (wet - dry)) * 100));
        const pin = item.arduinoPin ?? "N/A";
        return `Humedad suelo: ${pct.toFixed(1)}% (ADC ${raw}, Pin ${pin})`;
      }
      if (unit === "ph") return `pH: ${(raw / 100).toFixed(2)}`;
      if (unit === "ADC") return `${key}: ${raw} ADC`;
      return `${key}: ${raw} ${unit}`.trim();
    }

    function endpointLabel(path) {
      if (path.includes("atmosfera")) return "Atmósfera";
      if (path.includes("humedad")) return "Suelo";
      if (path.includes("agua")) return "Agua";
      return "Sensor";
    }

    function fmtPct(value) {
      if (value == null || Number.isNaN(value)) return "—";
      return `${Number(value).toFixed(1)}%`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseRelayLog(message) {
      for (const prefix of ["AUTO relés -> ", "MANUAL relés -> "]) {
        if (!message.startsWith(prefix)) continue;

        const items = [];
        for (const label of RELAY_LABELS) {
          const token = `${label}:`;
          const index = message.indexOf(token);
          if (index === -1) continue;
          const stateText = message.slice(index + token.length);
          if (stateText.startsWith("ON")) {
            items.push({ label, on: true });
          } else if (stateText.startsWith("OFF")) {
            items.push({ label, on: false });
          }
        }
        if (items.length) return items;
      }
      return null;
    }

    function renderRelayIcons(items, showLabel = false) {
      const row = items.map(({ label, on }) => `
        <span
          class="log-relay ${on ? "on" : "off"}"
          data-relay="${label.toLowerCase().replaceAll(" ", "-")}"
          title="${escapeHtml(label)}: ${on ? "ON" : "OFF"}"
        >
          <span class="log-relay-icon">${uiIcon(RELAY_ICON_KEYS[label] || "bolt", "ui-icon--log")}</span>
          <span class="log-relay-name">${escapeHtml(label)}</span>
        </span>
      `).join("");

      if (showLabel) {
        return `<span class="log-relay-label">Relés</span><span class="log-relay-row">${row}</span>`;
      }
      return `<span class="log-relay-row">${row}</span>`;
    }

    function relaysToItems(relays, labels) {
      if (!relays || !relays.length) return [];
      return relays.map((on, index) => ({
        label: labels?.[index] || RELAY_LABELS[index] || `R${index + 1}`,
        on: Boolean(on),
      }));
    }

    function parsePumpLog(message) {
      let match = message.match(/^Bomba: micropulso (\d+) completado \(nodo\)$/);
      if (match) {
        return { type: "pulse_done", pulse: Number(match[1]) };
      }

      match = message.match(
        /^Bomba: objetivo alcanzado \(([\d.]+)% >= ([\d.]+)%\) tras (\d+) pulsos$/
      );
      if (match) {
        return {
          type: "target_reached",
          soil: Number(match[1]),
          target: Number(match[2]),
          pulses: Number(match[3]),
        };
      }

      match = message.match(
        /^Bomba: tope de (\d+) pulsos, suelo ([\d.]+)% \(objetivo ([\d.]+)%\) — puede reiniciar si sigue seco$/
      );
      if (match) {
        return {
          type: "max_pulses",
          max: Number(match[1]),
          soil: Number(match[2]),
          target: Number(match[3]),
        };
      }

      match = message.match(/^Bomba: manual (ON|OFF)$/);
      if (match) {
        return { type: "manual", text: message.replace(/^Bomba:\s*/, "") };
      }

      if (message.startsWith("Bomba:")) {
        return { type: "generic", text: message.replace(/^Bomba:\s*/, "") };
      }

      if (message.startsWith("Modo cambiado")) {
        return { type: "mode", text: message };
      }

      if (message.startsWith("AUTO relés ->") || message.startsWith("MANUAL relés ->")) {
        return null;
      }

      return { type: "generic", text: message };
    }

    function classifyLog(message) {
      if (parseRelayLog(message)) return "relay";
      const pump = parsePumpLog(message);
      if (pump && ["pulse_done", "target_reached", "max_pulses"].includes(pump.type)) {
        return "irrigation";
      }
      return "other";
    }

    function formatLogWhen(iso) {
      const date = new Date(iso);
      return date.toLocaleString([], {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function renderRelayIconsCompact(items) {
      return `<span class="hist-relays">${items.map(({ label, on }) => `
        <span
          class="log-relay ${on ? "on" : "off"}"
          data-relay="${label.toLowerCase().replaceAll(" ", "-")}"
          title="${escapeHtml(label)}: ${on ? "ON" : "OFF"}"
        >
          <span class="log-relay-icon">${uiIcon(RELAY_ICON_KEYS[label] || "bolt", "ui-icon--log")}</span>
        </span>
      `).join("")}</span>`;
    }

    function groupIrrigationLogs(logs) {
      const entries = [];
      let pulses = [];

      const flushPulses = () => {
        if (!pulses.length) return;
        const nums = pulses.map((log) => parsePumpLog(log.message).pulse).sort((a, b) => a - b);
        entries.push({
          kind: "pulses",
          at: pulses[0].created_at,
          text: pulses.length === 1
            ? `Pulso ${nums[0]}`
            : `${pulses.length} pulsos · ${nums[0]}→${nums[nums.length - 1]}`,
        });
        pulses = [];
      };

      for (const log of logs) {
        const pump = parsePumpLog(log.message);
        if (pump?.type === "pulse_done") {
          pulses.push(log);
          continue;
        }
        flushPulses();
        entries.push({ kind: "event", log, pump });
      }
      flushPulses();
      return entries;
    }

    function renderIrrigationEntry(entry) {
      if (entry.kind === "pulses") {
        return `
          <div class="hist-row">
            <time class="hist-when">${formatLogWhen(entry.at)}</time>
            <span class="hist-text">${escapeHtml(entry.text)}</span>
          </div>
        `;
      }

      const { log, pump } = entry;
      if (pump?.type === "target_reached") {
        return `
          <div class="hist-row hist-row--ok">
            <time class="hist-when">${formatLogWhen(log.created_at)}</time>
            <span class="hist-text">Objetivo ${pump.soil.toFixed(1)}% · ${pump.pulses} pulsos</span>
          </div>
        `;
      }

      if (pump?.type === "max_pulses") {
        return `
          <div class="hist-row hist-row--warn">
            <time class="hist-when">${formatLogWhen(log.created_at)}</time>
            <span class="hist-text">Tope ${pump.max} pulsos · suelo ${pump.soil.toFixed(1)}%</span>
          </div>
        `;
      }

      const text = pump?.text || log.message.replace(/^Bomba:\s*/, "");
      return `
        <div class="hist-row">
          <time class="hist-when">${formatLogWhen(log.created_at)}</time>
          <span class="hist-text">${escapeHtml(text)}</span>
        </div>
      `;
    }

    function renderHistorySection(title, rowsHtml) {
      if (!rowsHtml) return "";
      return `
        <section class="hist-section">
          <h4 class="hist-section-title">${title}</h4>
          <div class="hist-list">${rowsHtml}</div>
        </section>
      `;
    }

    function renderLogsList(logs) {
      if (!logs.length) {
        return '<p class="empty">Sin eventos registrados.</p>';
      }

      const groups = { irrigation: [], relay: [], other: [] };
      for (const log of logs) {
        groups[classifyLog(log.message)].push(log);
      }

      const irrigationHtml = groupIrrigationLogs(groups.irrigation)
        .map(renderIrrigationEntry)
        .join("");

      const relayHtml = groups.relay.map((log) => {
        const relays = parseRelayLog(log.message);
        return `
          <div class="hist-row">
            <time class="hist-when">${formatLogWhen(log.created_at)}</time>
            ${renderRelayIconsCompact(relays)}
          </div>
        `;
      }).join("");

      const otherHtml = groups.other.map((log) => `
        <div class="hist-row">
          <time class="hist-when">${formatLogWhen(log.created_at)}</time>
          <span class="hist-text">${escapeHtml(log.message)}</span>
        </div>
      `).join("");

      return [
        renderHistorySection("Riego", irrigationHtml),
        renderHistorySection("Relés", relayHtml),
        renderHistorySection("Sistema", otherHtml),
      ].filter(Boolean).join("") || '<p class="empty">Sin eventos registrados.</p>';
    }

    let automationLogs = [];
    let sensorReadings = [];
    let readingsHubScope = "etapa";
    let readingsHubData = null;
    let readingsHubAbort = null;
    let readingsHubRefreshTimer = null;
    const readingsHubExpanded = new Set();

      temp_c: "Temperatura",
      hr_pct: "HR aire",
      mq135: "Calidad aire",
      soil_pct: "Humedad suelo",
      soil_adc: "Señal suelo",
    };

    const READINGS_METRIC_UNITS = {
      temp_c: "°C",
      hr_pct: "%",
      mq135: "",
      soil_pct: "%",
      soil_adc: "",
    };
    let cultivationPlan = null;

    const PLAN_STATUS_LABELS = {
      ok: "OK",
      low: "Bajo",
      high: "Alto",
      unknown: "—",
    };

    const PLAN_SHORT_LABELS = {
      germinacion: "Germ.",
      plantula: "Plánt.",
      vegetativo: "Veg.",
      floracion: "Flor.",
      floracion_tardia: "Tardía",
    };

    function planBarPosition(value, scaleMin, scaleMax) {
      if (value == null || Number.isNaN(value)) return null;
      return Math.max(0, Math.min(100, ((value - scaleMin) / (scaleMax - scaleMin)) * 100));
    }

    function renderPlanStatus(status) {
      const label = PLAN_STATUS_LABELS[status] || "—";
      return `<span class="plan-status plan-status--${status || "unknown"}">${label}</span>`;
    }

    function renderPlanMetricBar(metric, label, scaleMin, scaleMax, objectiveLabel) {
      const dotPos = planBarPosition(metric.value, scaleMin, scaleMax);
      const rangeLeft = planBarPosition(metric.min, scaleMin, scaleMax);
      const rangeRight = planBarPosition(metric.max, scaleMin, scaleMax);
      const rangeWidth = rangeLeft == null || rangeRight == null ? 0 : Math.max(0, rangeRight - rangeLeft);
      const valueText = metric.value != null ? `${Number(metric.value).toFixed(1)}${metric.unit}` : "—";

      return `
        <div class="plan-metric">
          <div class="plan-metric-head">
            <span class="plan-metric-label">${escapeHtml(label)}</span>
            <span class="plan-metric-value">${valueText} ${renderPlanStatus(metric.status)}</span>
          </div>
          <div class="plan-metric-track" aria-hidden="true">
            <div
              class="plan-metric-range"
              style="left:${rangeLeft ?? 0}%;width:${rangeWidth}%"
            ></div>
            ${dotPos != null ? `<div class="plan-metric-dot" style="left:${dotPos}%"></div>` : ""}
          </div>
          <small class="plan-metric-objective">${escapeHtml(objectiveLabel)}</small>
        </div>
      `;
    }

    function renderPlanTimeline(plan, compact = false) {
      const segments = plan.fases.map((phase) => {
        const shortLabel = PLAN_SHORT_LABELS[phase.nombre] || phase.label;
        const title = `${phase.label} · días ${phase.dias[0]}–${phase.dias[1]}`;
        return `
          <div
            class="plan-segment ${phase.activa ? "plan-segment--active" : ""}"
            style="flex:${phase.duracion} 1 0"
            title="${escapeHtml(title)}"
          >
            <span class="plan-segment-label">${escapeHtml(compact ? shortLabel : phase.label)}</span>
            ${!compact ? `<span class="plan-segment-days">d${phase.dias[0]}–${phase.dias[1]}</span>` : ""}
          </div>
        `;
      }).join("");

      return `
        <div class="plan-timeline">
          <div class="plan-timeline-track">
            ${segments}
            <div class="plan-marker" style="left:${plan.marker_pct}%">
              <span class="plan-marker-tip">Día ${plan.dia_cultivo}</span>
            </div>
          </div>
          <div class="plan-timeline-meta">
            <span>Día <strong>${plan.dia_cultivo}</strong> / ${plan.dia_total}</span>
            <span>${escapeHtml(plan.fase_label)}</span>
            <span>${plan.progress_pct}% del ciclo</span>
          </div>
        </div>
      `;
    }

    function renderPlanAirQuality(metric) {
      const valueText = metric.value != null ? `${Math.round(metric.value)} ADC` : "—";
      const alert = metric.max != null ? Math.round(metric.max) : null;
      const baseline = metric.baseline != null ? Math.round(metric.baseline) : null;
      return `
        <div class="plan-metric">
          <div class="plan-metric-head">
            <span class="plan-metric-label">Calidad aire</span>
            <span class="plan-metric-value">${valueText} ${renderPlanStatus(metric.status)}</span>
          </div>
          <small class="plan-metric-hint">MQ135 · alerta &gt; ${alert ?? "—"} ADC · base ${baseline ?? "—"}</small>
        </div>
      `;
    }

    function renderPlanMetrics(plan) {
      const metrics = plan.sensors_vs_targets || {};
      const temp = metrics.temp_c || {};
      const hr = metrics.hr_pct || {};
      const air = metrics.mq135 || {};
      const soil = metrics.soil_pct || {};

      return `
        <div class="plan-metrics">
          ${renderPlanMetricBar(
            temp,
            "Temp",
            15,
            32,
            `Objetivo ${temp.min ?? "—"}–${temp.max ?? "—"}°C`
          )}
          ${renderPlanMetricBar(
            hr,
            "HR aire",
            30,
            80,
            `Objetivo ${hr.min ?? "—"}–${hr.max ?? "—"}%`
          )}
          ${renderPlanAirQuality(air)}
          ${renderPlanMetricBar(
            soil,
            "Suelo",
            0,
            100,
            `Regar < ${soil.min ?? "—"}% · parar ${soil.max ?? "—"}%`
          )}
        </div>
      `;
    }

    function renderPlanTable(plan) {
      const rows = plan.fases.map((phase) => {
        const targets = phase.targets || {};
        return `
          <tr class="${phase.activa ? "plan-table-row--active" : ""}">
            <td>
              <strong>${escapeHtml(phase.label)}</strong>
              ${phase.activa ? '<span class="badge on plan-now-badge">Ahora</span>' : ""}
            </td>
            <td>${phase.dias[0]}–${phase.dias[1]}</td>
            <td>${targets.temp_min}–${targets.temp_max} °C</td>
            <td>${targets.hr_min}–${targets.hr_max} %</td>
            <td>${targets.suelo_min} → ${targets.suelo_objetivo} %</td>
            <td>${phase.caloventor ? "Sí" : "—"}</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="plan-table-wrap">
          <table class="plan-table">
            <thead>
              <tr>
                <th>Etapa</th>
                <th>Días</th>
                <th>Temp</th>
                <th>HR aire</th>
                <th>Suelo</th>
                <th>Caloventor</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderCultivationPlan(plan) {
      cultivationPlan = plan;
      if (!plan || !plan.fases?.length) {
        cultivationPlanEl.innerHTML = '<p class="empty">Sin plan configurado.</p>';
        return;
      }

      const luz = plan.luz || {};
      cultivationPlanEl.innerHTML = `
        <div class="card plan-card">
          <div class="plan-card-head">
            <div>
              <strong>${escapeHtml(plan.nombre || "Plan")}</strong>
              ${plan.variedad ? `<div class="meta-line">${escapeHtml(plan.variedad)}</div>` : ""}
            </div>
            <div class="plan-light-meta">
              <span class="badge ${luz.horas_on ? "on" : "off"}">${luz.horas_on || "—"}h ON</span>
              <span>${escapeHtml(luz.tipo || "LED")}</span>
            </div>
          </div>
          ${renderPlanTimeline(plan, true)}
          ${renderPlanMetrics(plan)}
        </div>
      `;
    }

    function renderPlanModalContent(plan) {
      if (!plan || !plan.fases?.length) {
        return '<p class="empty">Sin plan configurado.</p>';
      }

      const luz = plan.luz || {};
      const endHour = luz.inicio && luz.horas_on
        ? (() => {
            const [hour, minute] = luz.inicio.split(":").map(Number);
            const totalMinutes = hour * 60 + minute + luz.horas_on * 60;
            const endH = Math.floor(totalMinutes / 60) % 24;
            const endM = totalMinutes % 60;
            return `${String(endH).padStart(2, "0")}:${String(endM).padStart(2, "0")}`;
          })()
        : "—";

      return `
        <div class="plan-modal-intro">
          <p><strong>${escapeHtml(plan.nombre || "Plan")}</strong>${plan.variedad ? ` · ${escapeHtml(plan.variedad)}` : ""}</p>
          <p class="meta-line">
            Inicio ${plan.dia_inicio || "—"} · Día ${plan.dia_cultivo} / ${plan.dia_total}
            · ${escapeHtml(plan.fase_label)}
          </p>
          <p class="meta-line">
            Luz ${luz.horas_on || "—"}h/día (${luz.inicio || "—"} – ${endHour})
            · ${escapeHtml(luz.tipo || "LED full spectrum")}
          </p>
        </div>
        ${renderPlanTimeline(plan, false)}
        ${renderPlanMetrics(plan)}
        ${renderPlanTable(plan)}
      `;
    }

    function closePlanModal() {
      const modal = document.getElementById("plan-modal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      syncModalUiState();
    }

    window.openPlanModal = openPlanModal;
    window.closePlanModal = closePlanModal;

    function syncModalUiState() {
      const anyOpen = Boolean(document.querySelector(".modal.open"));
      document.body.classList.toggle("modal-open", anyOpen);
      try {
        const blockPull = anyOpen || growBoxFullscreen;
        window.GreenboxAndroid?.setPullRefreshEnabled?.(!blockPull);
      } catch (error) {
        /* WebView bridge no disponible fuera de la app */
      }
    }

    let growBoxFullscreen = false;

    function syncGrowBoxFullscreen() {
      const viewport = document.getElementById("grow-box-viewport");
      if (!viewport) return;
      viewport.classList.toggle("grow-box-viewport--fullscreen", growBoxFullscreen);
      document.body.classList.toggle("grow-box-fs-open", growBoxFullscreen);
      const btn = viewport.querySelector(".grow-box-fs-btn");
      if (btn) {
        btn.setAttribute("aria-pressed", String(growBoxFullscreen));
        btn.title = growBoxFullscreen ? "Salir de pantalla completa" : "Pantalla completa";
        btn.setAttribute("aria-label", btn.title);
      }
      syncModalUiState();
    }

    async function toggleGrowBoxFullscreen(force) {
      const next = typeof force === "boolean" ? force : !growBoxFullscreen;
      if (next === growBoxFullscreen) return;
      growBoxFullscreen = next;
      syncGrowBoxFullscreen();
      if (next) {
        await requestGrowBoxNativeFullscreen();
      } else {
        await exitGrowBoxNativeFullscreen();
      }
    }

    window.toggleGrowBoxFullscreen = toggleGrowBoxFullscreen;

    function initGrowBoxFullscreen() {
      document.addEventListener("click", (event) => {
        if (!growBoxFullscreen) return;
        const viewport = document.getElementById("grow-box-viewport");
        if (!viewport?.classList.contains("grow-box-viewport--fullscreen")) return;
        if (event.target.closest(".grow-phase-rail")) return;
        if (event.target.closest(".grow-box-toolbar")) return;
        if (event.target.closest(".grow-equip-btn, .grow-light-btn, .grow-irrigation-btn")) return;
        toggleGrowBoxFullscreen(false);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && growBoxFullscreen) {
          toggleGrowBoxFullscreen(false);
        }
      });

      document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement && growBoxFullscreen) {
          growBoxFullscreen = false;
          syncGrowBoxFullscreen();
        }
      });
    }

    async function requestGrowBoxNativeFullscreen() {
      const viewport = document.getElementById("grow-box-viewport");
      if (!viewport?.requestFullscreen) return;
      try {
        await viewport.requestFullscreen({ navigationUI: "hide" });
      } catch (error) {
        /* overlay CSS alcanza en WebView */
      }
    }

    async function exitGrowBoxNativeFullscreen() {
      if (!document.fullscreenElement) return;
      try {
        await document.exitFullscreen();
      } catch (error) {
        /* ignore */
      }
    }

    function openPlanModal() {
      const modal = document.getElementById("plan-modal");
      document.getElementById("plan-modal-body").innerHTML = renderPlanModalContent(cultivationPlan);
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      syncModalUiState();
    }

    function nodeStatusLabel(status) {
      if (status === "sin_datos") return "Sin datos";
      return statusLabel(status);
    }

    function renderSparkline(points) {
      if (!points || points.length < 2) {
        return '<svg class="readings-sparkline" viewBox="0 0 120 32" preserveAspectRatio="none" aria-hidden="true"><line x1="0" y1="16" x2="120" y2="16" class="readings-sparkline-flat"/></svg>';
      }
      const values = points.map((point) => Number(point.v));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const width = 120;
      const height = 32;
      const coords = points.map((point, index) => {
        const x = (index / (points.length - 1)) * width;
        const y = height - ((Number(point.v) - min) / range) * (height - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(" ");
      return `<svg class="readings-sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true"><polyline points="${coords}"/></svg>`;
    }

    function formatReadingsCurrent(node) {
      if (node.kind === "actuator") {
        if (node.key === "bomba") {
          return node.detail || (node.current?.active ? "ON" : "OFF");
        }
        if (node.key === "relays") {
          const active = node.current?.active_count ?? 0;
          return `${active} activo${active === 1 ? "" : "s"}`;
        }
      }
      const current = node.current || {};
      const parts = [];
      if (current.temp_c != null) parts.push(`${fmtMetric(current.temp_c)}°C`);
      if (current.hr_pct != null) parts.push(`HR ${fmtMetric(current.hr_pct)}%`);
      if (current.mq135 != null) parts.push(`MQ ${fmtMetric(current.mq135, 0)}`);
      if (current.soil_pct != null) parts.push(`${fmtMetric(current.soil_pct)}% suelo`);
      return parts.length ? parts.join(" · ") : "—";
    }

    function renderReadingsPumpEvents(events) {
      if (!events?.length) {
        return '<p class="empty readings-node-empty">Sin pulsos ni eventos de riego en este período.</p>';
      }
      return `
        <div class="readings-events">
          ${events.map((event) => {
            const parsed = parsePumpLog(event.message);
            let text = event.display || event.message.replace(/^Bomba:\s*/, "");
            if (parsed?.type === "pulse_done") {
              text = `Pulso ${parsed.pulse} completado`;
            } else if (parsed?.type === "target_reached") {
              text = `Objetivo ${parsed.soil.toFixed(1)}% · ${parsed.pulses} pulsos`;
            } else if (parsed?.type === "max_pulses") {
              text = `Tope ${parsed.max} pulsos · suelo ${parsed.soil.toFixed(1)}%`;
            } else if (parsed?.type === "manual") {
              text = parsed.text;
            }
            return `
              <div class="readings-event-row readings-event-row--${event.type || "generic"}">
                <span class="readings-event-time">${formatLogWhen(event.at)}</span>
                <span class="readings-event-text">${escapeHtml(text)}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderReadingsRelayEvents(events) {
      if (!events?.length) {
        return '<p class="empty readings-node-empty">Sin cambios de relés en este período.</p>';
      }
      return `
        <div class="readings-events">
          ${events.map((event) => `
            <div class="readings-event-row readings-event-row--relay">
              <span class="readings-event-time">${formatLogWhen(event.at)}</span>
              <span class="badge ${event.source === "auto" ? "on" : "off"}">${event.source === "auto" ? "AUTO" : "MANUAL"}</span>
              ${renderRelayIconsCompact(event.relays || [])}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderReadingsSoilCalibration(calibration, current) {
      const cal = calibration || {};
      const adc = current?.soil_adc;
      const pct = current?.soil_pct;
      const liveLine = adc != null
        ? `Lectura ahora: ADC <strong>${Math.round(adc)}</strong>${pct != null ? ` → <strong>${fmtMetric(pct)}%</strong>` : ""}`
        : "Sin lectura en vivo del sensor (esperá unos segundos).";

      return `
        <div class="readings-calibration">
          <div class="readings-recent-title">Calibración suelo (ADC → %)</div>

              Usar ahora como seco (0%)
            </button>
            <button type="button" class="secondary" onclick="applyCurrentSoilAdc('wet')" ${adc == null ? "disabled" : ""}>
              Usar ahora como húmedo (100%)
            </button>
          </div>
          <div class="readings-calibration-fields">
            <label>
              Seco (0%)
              <input type="number" id="readings-soil-dry" value="${cal.dry_adc ?? 2100}" min="0" max="4095">
            </label>
            <label>
              Húmedo (100%)
              <input type="number" id="readings-soil-wet" value="${cal.wet_adc ?? 1000}" min="0" max="4095">
            </label>
            <button type="button" class="primary" onclick="saveReadingsSoilCalibration()">Guardar</button>
            <button type="button" class="secondary" onclick="resetReadingsSoilCalibration()">Restaurar 2100/1000</button>

          <p class="readings-calibration-note">

    function applyCurrentSoilAdc(kind) {
      const soilNode = readingsHubData?.nodes?.find((node) => node.key === "suelo");
      const adc = soilNode?.current?.soil_adc;
      if (adc == null) return;
      const input = document.getElementById(kind === "dry" ? "readings-soil-dry" : "readings-soil-wet");
      if (input) input.value = Math.round(adc);
    }

    async function resetReadingsSoilCalibration() {
      const dryInput = document.getElementById("readings-soil-dry");
      const wetInput = document.getElementById("readings-soil-wet");
      if (dryInput) dryInput.value = 2100;
      if (wetInput) wetInput.value = 1000;
      await saveReadingsSoilCalibration();
    }

    async function saveReadingsSoilCalibration() {
      const dryInput = document.getElementById("readings-soil-dry");
      const wetInput = document.getElementById("readings-soil-wet");
      if (!dryInput || !wetInput) return;
      const response = await fetch("/api/sensors/calibration/suelo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          dry_adc: Number(dryInput.value),
          wet_adc: Number(wetInput.value),
        }),
      });
      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        alert(error.error || "No se pudo guardar la calibración");
        return;
      }
      soilConfig = await response.json();
      await loadReadingsHub(readingsHubScope);
      await loadDashboard();
    }

    function renderReadingsMetricBlock(key, stats, series) {
      const label = READINGS_METRIC_LABELS[key] || key;
      const unit = READINGS_METRIC_UNITS[key] || "";
      if (!stats) {
        return `
          <div class="readings-metric">
            <div class="readings-metric-head">
              <span class="label">${label}</span>
              <strong>—</strong>
            </div>
            ${renderSparkline([])}
          </div>
        `;
      }
      return `
        <div class="readings-metric">
          <div class="readings-metric-head">
            <span class="label">${label}</span>
            <strong>${fmtMetric(stats.last, key === "mq135" ? 0 : 1)}<small>${unit}</small></strong>
          </div>
          ${renderSparkline(series)}
          <div class="readings-metric-stats">
            <span>mín ${fmtMetric(stats.min, key === "mq135" ? 0 : 1)}${unit}</span>
            <span>prom ${fmtMetric(stats.avg, key === "mq135" ? 0 : 1)}${unit}</span>
            <span>máx ${fmtMetric(stats.max, key === "mq135" ? 0 : 1)}${unit}</span>
            <span>${stats.count} pts</span>
          </div>
        </div>
      `;

    function renderReadingsNode(node) {
      const expanded = readingsHubExpanded.has(node.key);
      const metricOrder = ["temp_c", "hr_pct", "mq135", "soil_pct", "soil_adc"];
      const metricKeys = node.kind === "sensor"
        ? metricOrder.filter((key) => node.metrics && node.metrics[key])
        : [];
      const badgeClass = node.status === "online" ? "on" : "off";
      const boxLabel = node.box_id || "Sin configurar";

      let body = "";
      if (node.kind === "sensor") {
        if (expanded && node.key === "suelo" && node.calibration) {
          body += renderReadingsSoilCalibration(node.calibration, node.current);
        }
        body += `
          <div class="readings-node-metrics ${expanded ? "readings-node-metrics--expanded" : ""}">
            ${metricKeys.length
              ? metricKeys.map((key) => renderReadingsMetricBlock(
                key,
                node.metrics[key],
                (node.series || {})[key] || [],
              )).join("")
              : '<p class="empty readings-node-empty">Sin lecturas en este período.</p>'}
          </div>
        `;
        if (expanded && node.recent?.length) {
          body += `
            <div class="readings-recent">
              <div class="readings-recent-title">Últimas lecturas</div>
              <div class="readings-table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Hora</th>
                      <th>Valores</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${node.recent.map((row) => `
                      <tr>
                        <td>${new Date(row.received_at).toLocaleString()}</td>
                        <td>${row.display || "—"}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          `;
        }
      } else if (node.key === "bomba") {
        body = `
          <div class="readings-actuator-state">
            <span class="badge ${node.current?.active ? "on" : "off"}">${node.detail || "OFF"}</span>
            <span class="readings-actuator-meta">Último contacto: ${node.last_at ? new Date(node.last_at).toLocaleString() : "Sin registro"}</span>
          </div>
          <div class="readings-recent">
            <div class="readings-recent-title">Historial de riego (${node.reading_count || 0})</div>
            ${renderReadingsPumpEvents(node.events || [])}
          </div>
        `;
      } else if (node.key === "relays") {
        body = `
          <div class="readings-relay-list">
            ${(node.relays || []).length
              ? node.relays.map((relay) => `
                <div class="readings-relay-row">
                  <span>${relay.label}</span>
                  <span class="badge ${relay.on ? "on" : "off"}">${relay.on ? "ON" : "OFF"}</span>
                </div>
              `).join("")
              : '<p class="empty readings-node-empty">Sin relés configurados.</p>'}
          </div>
          <div class="readings-recent">
            <div class="readings-recent-title">Historial ON/OFF (${node.reading_count || 0})</div>
            ${renderReadingsRelayEvents(node.events || [])}
          </div>

      }

      return `
        <article class="readings-node ${expanded ? "readings-node--open" : ""} ${node.status}">
          <button type="button" class="readings-node-head" onclick="toggleReadingsNode('${node.key}')" aria-expanded="${expanded}">
            <div class="readings-node-intro">
              <div class="readings-node-title-row">
                <strong>${node.title}</strong>
                <span class="badge ${badgeClass}">${nodeStatusLabel(node.status)}</span>
              </div>
              <div class="mono readings-node-id">${boxLabel}</div>
              <div class="readings-node-current">${formatReadingsCurrent(node)}</div>
              ${node.key === "suelo" && node.calibration
                ? `<div class="readings-node-cal-hint">Calibración: ${node.calibration.dry_adc} / ${node.calibration.wet_adc} ADC${node.calibration.custom ? " · personalizada" : ""}</div>`
                : ""}
            </div>
            <div class="readings-node-side">
              ${node.kind === "sensor"
                ? `<span class="readings-node-count">${node.reading_count || 0} lecturas</span>`
                : (node.reading_count
                  ? `<span class="readings-node-count">${node.reading_count} eventos</span>`
                  : "")}

    function renderReadingsHub(data) {
      if (!data) {
        return '<p class="empty">No se pudo cargar el historial.</p>';
      }
      const summary = data.summary || {};
      return `
        <div class="readings-hub">
          <div class="readings-hub-toolbar">

            </div>
            <p class="readings-hub-meta">${data.label || ""} · ${summary.online || 0}/${summary.total || 0} en línea · Día ${data.dia_cultivo || "—"}</p>

    async function loadReadingsHub(scope = readingsHubScope, { silent = false } = {}) {
      readingsHubScope = scope;
      if (readingsHubAbort) {
        readingsHubAbort.abort();
      }
      readingsHubAbort = new AbortController();
      const { signal } = readingsHubAbort;

      if (!silent) {
        const body = document.getElementById("readings-modal-body");
        if (body && !readingsHubData) {
          body.innerHTML = '<p class="empty">Cargando historial...</p>';
        }
      }

      try {
        const response = await fetch(
          `/api/readings/hub?scope=${encodeURIComponent(scope)}`,
          { signal },
        );
        if (!response.ok) throw new Error("readings hub failed");
        readingsHubData = await response.json();
      } catch (error) {
        if (error.name === "AbortError") return;
        if (!readingsHubData) readingsHubData = null;
      } finally {
        if (readingsHubAbort?.signal === signal) {
          readingsHubAbort = null;
        }
      }

      const body = document.getElementById("readings-modal-body");
      if (body) {
        body.innerHTML = renderReadingsHub(readingsHubData);
      }
    }

    function startReadingsHubRefresh() {
      stopReadingsHubRefresh();
      readingsHubRefreshTimer = setInterval(() => {
        if (document.getElementById("readings-modal").classList.contains("open")) {
          loadReadingsHub(readingsHubScope, { silent: true });
        }
      }, 45000);
    }

    function stopReadingsHubRefresh() {
      if (readingsHubRefreshTimer) {
        clearInterval(readingsHubRefreshTimer);
        readingsHubRefreshTimer = null;
      }
      if (readingsHubAbort) {
        readingsHubAbort.abort();
        readingsHubAbort = null;
      }
    }

    function setReadingsScope(scope) {
      loadReadingsHub(scope);
    }

    function toggleReadingsNode(key) {
      if (readingsHubExpanded.has(key)) {
        readingsHubExpanded.delete(key);
      } else {
        readingsHubExpanded.add(key);
      }
      const body = document.getElementById("readings-modal-body");
      if (body && readingsHubData) {
        body.innerHTML = renderReadingsHub(readingsHubData);
      }
    }

      modal.classList.add("open");

      modal.classList.remove("open");

      syncModalUiState();

    function ambientGauge(label, iconKey, metric) {
      const value = metric?.value;
      const unit = metric?.unit || "";
      const status = metric?.status || "unknown";
      const decimals = metric?.decimals ?? 1;
      const display = value != null ? `${Number(value).toFixed(decimals)}${unit}` : "—";
      const hint = metric?.baseline != null
        ? `MQ135 · base ${Math.round(metric.baseline)} · alerta &gt; ${Math.round(metric.max ?? metric.baseline)}`
        : escapeHtml(label);
      return `
        <div class="ambient-gauge ambient-gauge--${status}" title="${hint}">
          <span class="ambient-gauge-icon">${uiIcon(iconKey)}</span>
          <span class="ambient-gauge-label">${escapeHtml(label)}</span>
          <strong class="ambient-gauge-value">${display}</strong>
          <span class="plan-status plan-status--${status}">${PLAN_STATUS_LABELS[status]}</span>
        </div>
      `;
    }

    function referenceGauge(label, iconKey, min, max, unit = "") {
      return `

        const isSelected = index === selectedIndex;
        return `

            title="${escapeHtml(phase.label)} · días ${phase.dias[0]}–${phase.dias[1]}"

            <span class="grow-step-icon">${phaseIcon(phase.nombre)}</span>
            <span class="grow-step-name">${escapeHtml(phase.label)}</span>

    function growRadialBlades(cx, cy, count, innerR, outerR, active) {
      const fill = active ? "#e2e8f0" : "#4b5563";
      const parts = [];
      for (let i = 0; i < count; i += 1) {
        const base = ((i / count) * 360 - 90) * (Math.PI / 180);
        const tip = base + (Math.PI / count) * 1.35;
        const tail = base - (Math.PI / count) * 0.45;
        const x0 = cx + Math.cos(base) * innerR;
        const y0 = cy + Math.sin(base) * innerR;
        const x1 = cx + Math.cos(tip) * outerR;
        const y1 = cy + Math.sin(tip) * outerR;
        const x2 = cx + Math.cos(tail) * (outerR * 0.72);
        const y2 = cy + Math.sin(tail) * (outerR * 0.72);
        parts.push(`<path d="M ${x0.toFixed(2)} ${y0.toFixed(2)} Q ${x1.toFixed(2)} ${y1.toFixed(2)} ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${fill}"/>`);
      }
      return parts.join("");
    }

    async function setAutomationMode(mode) {
      try {
        const response = await fetch("/api/automation/mode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mode }),
        });
        if (!response.ok) throw new Error("No se pudo cambiar el modo");
        showToast(`Modo ${mode}`);
        await loadDashboard();
      } catch (error) {
        showToast(error.message || "Error al cambiar modo");
      }
    }

    async function toggleAutomationMode() {
      const mode = lastDashboardData?.automation?.mode || "MANUAL";
      await setAutomationMode(mode === "AUTO" ? "MANUAL" : "AUTO");
    }

    async function toggleGrowEquip(equipKey) {
      if (!isManualMode()) {
        showToast("Pasá a MANUAL para controlar equipos desde el indoor");
        return;
      }
      if (equipKey === "irrigation") {
        const pump = lastDashboardData?.pumps?.[0];
        if (!pump) {
          showToast("Sin bomba registrada");
          return;
        }
        await setPump(pump.box_id, !pump.status);
        return;
      }
      const index = GROW_EQUIP_RELAY_INDEX[equipKey];
      if (index == null) return;
      const relayRow = lastDashboardData?.relays?.[0];
      if (!relayRow) {
        showToast("Sin relés registrados");
        return;
      }
      const logical = logicalRelays(relayRow, lastDashboardData.relay_config || {});
      await toggleRelay(relayRow.box_id, index, logical);
    }

    async function setPump(boxId, status) {
      try {
        const response = await fetch(`/bomba/control/${boxId}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status }),
        });
        if (!response.ok) throw new Error("No se pudo controlar la bomba");
        showToast(`Bomba ${boxId}: ${status ? "ON" : "OFF"}`);
        await loadDashboard();
      } catch (error) {
        showToast(error.message || "Error al controlar la bomba");
      }
    }

    async function toggleRelay(boxId, index, relays) {
      if (!isManualMode()) {
        showToast("Pasá a MANUAL para controlar relés");
        return;
      }
      const next = relays.map((value, i) => (i === index ? !value : value));
      const label = RELAY_LABELS[index] || `R${index + 1}`;
      try {
        const response = await fetch(`/relays/control/${boxId}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ relays: next }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || "No se pudo controlar el relé");
        }
        showToast(`${label} → ${next[index] ? "ON" : "OFF"}`);
        await loadDashboard();
      } catch (error) {
        showToast(error.message || "Error al controlar relés");
      }
    }

    function formatChartLabel(isoTime, view) {
      const date = new Date(isoTime);
      if (view === "days") {
        return date.toLocaleDateString([], { day: "2-digit", month: "2-digit" });
      }
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function drawSoilChart(series, thresholds = {}, view = soilChartView) {
      const canvas = soilChartCanvas;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.clientWidth || 640;
      const height = 180;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { top: 12, right: 12, bottom: 28, left: 36 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;

      ctx.strokeStyle = cssVar("--chart-grid");
      ctx.lineWidth = 1;
      ctx.fillStyle = cssVar("--chart-text");
      ctx.font = "11px system-ui, sans-serif";

      for (let pct = 0; pct <= 100; pct += 25) {
        const y = pad.top + plotH - (pct / 100) * plotH;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.fillText(`${pct}`, 4, y + 4);
      }

      if (!series.length) {
        ctx.fillStyle = cssVar("--chart-label");
        ctx.fillText("Sin datos en este período", pad.left, pad.top + plotH / 2);
        return;
      }

      const minY = 0;
      const maxY = 100;
      const xAt = (index) => pad.left + (index / Math.max(series.length - 1, 1)) * plotW;
      const yAt = (value) => pad.top + plotH - ((value - minY) / (maxY - minY)) * plotH;

      const drawThreshold = (value, color) => {
        if (value == null) return;
        const y = yAt(value);
        ctx.save();
        ctx.strokeStyle = color;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.restore();
      };

      drawThreshold(thresholds.min, "#f59e0b");
      drawThreshold(thresholds.target, "#22c55e");

      ctx.strokeStyle = cssVar("--chart-line");
      ctx.lineWidth = 2;
      ctx.beginPath();
      series.forEach((point, index) => {
        const x = xAt(index);
        const y = yAt(point.value);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = cssVar("--chart-dot");
      series.forEach((point, index) => {
        const x = xAt(index);
        const y = yAt(point.value);
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });

      const labelIndexes = series.length <= 4
        ? series.map((_, index) => index)
        : [0, Math.floor((series.length - 1) / 2), series.length - 1];

      labelIndexes.forEach((index) => {
        const x = xAt(index);
        const label = formatChartLabel(series[index].t, view);
        ctx.fillStyle = cssVar("--chart-label");
        ctx.fillText(label, Math.max(pad.left, x - 16), height - 8);
      });
    }

    function renderSoilChart(data) {

            <div class="actions">
              <button class="primary" onclick="setAutomationMode('AUTO')">AUTO</button>
              <button class="secondary" onclick="setAutomationMode('MANUAL')">MANUAL</button>
            </div>
          </div>
          <div class="grid-stats">
            <div><span class="label">Temp</span><strong>${fmt(sensors.temp_c?.toFixed?.(1), "°C")}</strong><small>${targets.temp_min ?? "—"}–${targets.temp_max ?? "—"}°C</small></div>
            <div><span class="label">HR aire</span><strong>${fmt(sensors.hr_pct?.toFixed?.(1), "%")}</strong><small>${targets.hr_min ?? "—"}–${targets.hr_max ?? "—"}%</small></div>
            <div><span class="label">Calidad aire</span><strong>${sensors.mq135 != null ? `${Math.round(sensors.mq135)} ADC` : "—"}</strong><small>MQ135 · base ${sensors.mq135_baseline != null ? Math.round(sensors.mq135_baseline) : "—"}</small></div>
            <div><span class="label">Suelo</span><strong>${fmtPct(sensors.soil_pct)}</strong><small>${targets.suelo_min ?? "—"}% → ${targets.suelo_objetivo ?? "—"}%</small></div>
            <div><span class="label">Riego</span><strong>${phaseLabels[irrigation.phase] || "—"}</strong><small>${irrigation.pulse_count || 0} pulsos · ${irrigation.pulse_seconds || "—"}s · obj ${targets.suelo_objetivo ?? "—"}%</small></div>
          </div>
          <div class="relay-current">
            <div class="relay-current-head">
              <span class="label">Estado relés</span>
              <button type="button" class="secondary history-btn" onclick="openHistoryModal()">Historial</button>
            </div>
            ${relayItems.length ? renderRelayIcons(relayItems) : '<p class="empty">Sin estado de relés.</p>'}
          </div>
          <div class="reasons">
            ${(ev.reasons || []).map((reason) => `<div>• ${reason}</div>`).join("") || '<div class="empty">Sin evaluación reciente.</div>'}
          </div>
        </div>
      `;
    }

    function renderPumps(pumps) {
      if (!pumps.length) {
        pumpsEl.innerHTML = '<p class="empty">Sin bombas registradas.</p>';
        return;
      }

      pumpsEl.innerHTML = pumps.map((pump) => `
        <div class="card">
          <div class="card-head">
            <span class="mono">${pump.box_id}</span>
            <span class="badge ${pump.status ? "on" : "off"}">${pump.status ? "ON" : "OFF"}</span>
          </div>
          <div class="actions">
            <button class="primary" onclick="setPump('${pump.box_id}', true)">Encender</button>
            <button class="danger" onclick="setPump('${pump.box_id}', false)">Apagar</button>
          </div>
        </div>
      `).join("");
    }

    /** true en wire = corta corriente (OFF físico). Panel usa estado lógico (ON = corriente). */
    function logicalRelays(relay, relayConfig) {
      if (relay.relays_wire != null) {
        return relay.relays || [];
      }
      const wireTrueOff = relayConfig?.wire_true_cuts_power !== false;
      return (relay.relays || []).map((value) => (wireTrueOff ? !value : Boolean(value)));
    }

    function renderRelays(relays, relayConfig) {
      if (!relays.length) {
        relaysEl.innerHTML = '<p class="empty">Sin módulos de relés registrados.</p>';
        return;
      }

      relaysEl.innerHTML = relays.map((relay) => {
        const logical = logicalRelays(relay, relayConfig);
        return `
        <div class="card relay-card">
          <div class="card-head">
            <span class="mono">${relay.box_id}</span>
          </div>
          <div class="relay-grid">
            ${logical.map((status, index) => `
              <button
                type="button"
                class="relay-tile ${status ? "on" : ""}"
                onclick='toggleRelay("${relay.box_id}", ${index}, ${JSON.stringify(logical)})'
              >
                <span class="relay-dot" aria-hidden="true"></span>
                <span class="relay-name">${RELAY_LABELS[index] || `R${index + 1}`}</span>
                <span class="relay-state">${status ? "ON" : "OFF"}</span>
              </button>
            `).join("")}
          </div>
        </div>`;
      }).join("");
    }

    let loadDashboardPromise = null;

    async function loadDashboard() {
      if (loadDashboardPromise) return loadDashboardPromise;
      loadDashboardPromise = (async () => {
        try {
          const response = await fetch("/api/dashboard");
          if (!response.ok) throw new Error("No se pudo cargar el panel");
          const data = await response.json();
          lastDashboardData = data;
          const plan = data.automation?.cultivation_plan || null;
          const ev = data.automation?.evaluation || {};

          sensorReadings = data.sensors || [];
          automationLogs = data.automation?.logs || [];
          soilConfig = data.soil_config || soilConfig;

          renderIndoorScene(data);
          renderControlBar(data);
          renderLightSchedule(data.light_schedule);
          renderCultivationPlan(plan);
          renderAutomation(data.automation || {});

          if (document.getElementById("controls-modal").classList.contains("open")) {
            document.getElementById("controls-modal-body").innerHTML = renderControlsModalContent(data);
          }
          if (document.getElementById("plan-modal").classList.contains("open")) {
            document.getElementById("plan-modal-body").innerHTML = renderPlanModalContent(plan);
          }
        } finally {
          loadDashboardPromise = null;
        }
      })();
      return loadDashboardPromise;
    }

    initGrowBoxFullscreen();
    loadDashboard();
    loadSoilChart();
    setInterval(loadDashboard, 10000);
    setInterval(loadSoilChart, 120000);

    window.setAutomationMode = setAutomationMode;
    window.toggleAutomationMode = toggleAutomationMode;
    window.toggleGrowEquip = toggleGrowEquip;
    window.setPump = setPump;
    window.toggleRelay = toggleRelay;

    function appTabletReload() {
      if (window.GreenboxAndroid?.reload) {
        window.GreenboxAndroid.reload();
      } else {
        loadDashboard();
      }
    }

    function appTabletSettings() {
      if (window.GreenboxAndroid?.openSettings) {
        window.GreenboxAndroid.openSettings();
      }
    }
  </script>
</body>
</html>
